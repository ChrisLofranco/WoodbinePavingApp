name: Deploy to GitHub Pages (bridge)

# TEMPORARY BRIDGE: keeps the existing GitHub Pages link updating until Firebase
# Hosting is set up and confirmed. Once Firebase is live, this file can be
# deleted and GitHub Pages turned off (Settings → Pages → Source: None).
#
# Mirrors main to the gh-pages branch, which triggers GitHub's built-in Pages
# build. Needs only contents:write.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror site to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push -f origin gh-pages
