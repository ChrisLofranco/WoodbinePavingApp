name: Deploy to GitHub Pages

# GitHub Pages is served from the `gh-pages` branch. On every push to main this
# mirrors the site there, which triggers GitHub's built-in Pages build so the
# live app stays up to date. Needs only contents:write (no Pages-admin token).
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror site to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push -f origin gh-pages
