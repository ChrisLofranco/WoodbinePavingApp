name: Deploy to GitHub Pages (bridge)

# TEMPORARY BRIDGE: keeps the existing GitHub Pages link updating until Firebase
# Hosting is set up and confirmed. Once Firebase is live, this file can be
# deleted and GitHub Pages turned off (Settings → Pages → Source: None).
#
# It mirrors main to the gh-pages branch, then explicitly REQUESTS a Pages
# build via the API. That request is required because GitHub does not
# auto-rebuild Pages when the push is made by the workflow's GITHUB_TOKEN.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror site to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push -f origin gh-pages

      - name: Request a GitHub Pages build
        run: |
          code=$(curl -sS -o /tmp/pages.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds")
          echo "Pages build request → HTTP $code"
          cat /tmp/pages.json 2>/dev/null || true
          # Don't fail the deploy if the API declines; the mirror still happened.
          if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "Build requested successfully."
          else
            echo "::warning::Pages build request returned $code — the site may not rebuild automatically."
          fi
